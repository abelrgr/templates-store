<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="barrelTop" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#a05c2a"/>
      <stop offset="100%" stop-color="#6b3a1f"/>
    </linearGradient>
    <linearGradient id="barrelBody" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#3a1c08"/>
      <stop offset="40%"  stop-color="#5a2e10"/>
      <stop offset="100%" stop-color="#3a1c08"/>
    </linearGradient>
  </defs>
  <!-- Barrel body -->
  <ellipse cx="32" cy="10" rx="26" ry="8"   fill="url(#barrelTop)"/>
  <rect    x="6"  y="10" width="52" height="44" fill="url(#barrelBody)"/>
  <ellipse cx="32" cy="54" rx="26" ry="8"   fill="url(#barrelTop)"/>
  <!-- Hoops -->
  <rect x="6"  y="20" width="52" height="5"  fill="#a05c2a" rx="1"/>
  <rect x="6"  y="38" width="52" height="5"  fill="#a05c2a" rx="1"/>
  <!-- DK star -->
  <text x="32" y="37" font-family="monospace" font-size="18" font-weight="bold"
        fill="#ffd000" text-anchor="middle" dominant-baseline="middle">DK</text>
</svg>
